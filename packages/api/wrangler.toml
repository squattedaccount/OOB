name = "oob-api"
main = "src/index.ts"
compatibility_date = "2024-11-15"

[vars]
# Protocol fee — OOB takes this on every order, enforced server-side
# TODO: Replace with your actual treasury address before deploying
PROTOCOL_FEE_RECIPIENT = "0x56A8Ad381232d6724Ae8AbDE838d70d1AE628575"
PROTOCOL_FEE_BPS = "50"  # 0.5% protocol fee

# Rate limiting defaults (per minute)
RATE_LIMIT_PUBLIC_READS = "60"
RATE_LIMIT_PUBLIC_WRITES = "30"
RATE_LIMIT_REGISTERED_READS = "300"
RATE_LIMIT_REGISTERED_WRITES = "60"

# Secrets (set via wrangler secret put):
# - DATABASE_URL (Neon Postgres connection string)
# - API_ADMIN_TOKEN (for admin endpoints, optional)

# KV for rate limiting counters
# Create with: wrangler kv:namespace create "OOB_RATE_LIMIT"
[[kv_namespaces]]
binding = "OOB_RATE_LIMIT"
id = "d928a40abd4645d3b672639a45382519"

# Durable Objects for WebSocket streams
[durable_objects]
bindings = [
  { name = "ORDER_STREAM", class_name = "OrderStreamDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OrderStreamDO"]

# Queue for write-behind order ingestion (optional — falls back to direct DB write if not configured)
# Create with: wrangler queues create oob-order-ingest
[[queues.producers]]
binding = "ORDER_INGEST_QUEUE"
queue = "oob-order-ingest"

[[queues.consumers]]
queue = "oob-order-ingest"
max_batch_size = 50
max_batch_timeout = 2
max_retries = 3
dead_letter_queue = "oob-order-ingest-dlq"
